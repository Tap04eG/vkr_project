<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расставь буквы — новые задания 3</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background-color: #E1F5FE;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background-color: #B3E5FC;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(3, 169, 244, 0.2);
            border: 5px solid #03A9F4;
        }
        
        h1 {
            color: #01579B;
            text-align: center;
            margin-top: 0;
            text-shadow: 2px 2px 0 #81D4FA;
            font-size: 2.5rem;
        }
        
        .instructions {
            background-color: #4FC3F7;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #01579B;
            text-align: center;
            border: 3px dashed #03A9F4;
        }
        
        .progress-container {
            width: 100%;
            background-color: #81D4FA;
            border-radius: 10px;
            margin: 20px 0;
            height: 25px;
            overflow: hidden;
            border: 3px solid #03A9F4;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #03A9F4;
            border-radius: 7px;
            transition: width 0.5s ease;
        }
        
        .progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #01579B;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .game-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .task-container {
            flex: 1;
            min-width: 300px;
            background-color: #81D4FA;
            border-radius: 15px;
            padding: 15px;
            border: 4px solid #03A9F4;
        }
        
        .task-title {
            text-align: center;
            color: #01579B;
            margin-top: 0;
            font-size: 1.8rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .letters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            min-height: 120px;
            padding: 15px;
            background-color: #B3E5FC;
            border-radius: 15px;
            border: 2px dashed #03A9F4;
        }
        
        .letter {
            width: 70px;
            height: 70px;
            background-color: #03A9F4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            cursor: move;
            user-select: none;
            transition: transform 0.2s, background-color 0.3s, opacity 0.3s;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
            border: 4px solid #0288D1;
        }
        
        .letter:hover {
            transform: scale(1.05);
        }
        
        .letter.dragging {
            opacity: 0.8;
            transform: scale(1.1);
        }
        
        .letter.used {
            opacity: 0.3;
            background-color: #0277BD;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .target-container {
            min-height: 150px;
            background-color: #B3E5FC;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 3px dashed #03A9F4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .target-title {
            color: #01579B;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        .sequence-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .sequence-slot {
            width: 80px;
            height: 80px;
            border: 3px dashed #03A9F4;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #01579B;
            background-color: #B3E5FC;
            transition: background-color 0.3s;
            cursor: pointer;
        }
        
        .sequence-slot.highlight {
            background-color: #4FC3F7;
        }
        
        .sequence-slot.filled {
            background-color: #81D4FA;
            border-style: solid;
        }
        
        .sequence-slot.correct {
            background-color: #C8E6C9;
            border-color: #4CAF50;
        }
        
        .sequence-slot.wrong {
            background-color: #FFCDD2;
            border-color: #F44336;
        }
        
        .result-container {
            text-align: center;
            padding: 20px;
            background-color: #4FC3F7;
            border-radius: 15px;
            border: 4px solid #03A9F4;
            margin-top: 20px;
            display: none;
        }
        
        .result-title {
            color: #01579B;
            margin-top: 0;
            font-size: 2rem;
        }
        
        .reward {
            font-size: 2.2rem;
            color: #01579B;
            font-weight: bold;
            text-shadow: 1px 1px 0 white;
            animation: pulse 1.5s infinite;
            margin-bottom: 25px;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        button {
            padding: 12px 30px;
            background-color: #03A9F4;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            background-color: #0288D1;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        button:disabled {
            background-color: #81D4FA;
            cursor: not-allowed;
            transform: none;
        }
        
        .task-status {
            text-align: center;
            font-size: 1.4rem;
            margin-top: 15px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .completed {
            color: #388E3C;
            font-weight: bold;
        }
        
        .not-completed {
            color: #D32F2F;
        }
        
        .final-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .game-area {
                flex-direction: column;
            }
            
            .task-container {
                min-width: 100%;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .letter {
                width: 65px;
                height: 65px;
                font-size: 2.2rem;
            }
            
            .sequence-slot {
                width: 70px;
                height: 70px;
            }
            
            .final-controls {
                flex-direction: column;
                gap: 10px;
            }
            
            .final-controls button {
                width: 100%;
            }
        }
        
        .connector {
            font-size: 2rem;
            color: #01579B;
            font-weight: bold;
            margin: 0 5px;
        }
        
        .check-button {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .check-button:hover {
            background-color: #45a049;
        }
        
        .check-button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .task-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .task-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #4FC3F7;
            border: 4px solid #03A9F4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            color: #01579B;
            cursor: pointer;
            transition: 0.2s;
        }
        .task-dot.active {
            background-color: #03A9F4;
            color: white;
            transform: scale(1.1);
            border-color: #01579B;
        }
        .task-dot.completed-dot {
            background-color: #66BB6A;
            border-color: #2E7D32;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Расставь буквы в правильном порядке!</h1>
        
        <div class="instructions">
            Перетащи буквы. Если что-то не так — можно попробовать снова.
        </div>

        <div class="task-nav" id="task-nav"></div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="progress-text" id="progress-text">Прогресс: 0/4</div>
        </div>
        
        <div class="game-area">
            <div class="task-container">
                <h2 class="task-title" id="task-title">Задание 1</h2>
                
                <div class="target-container">
                    <div class="target-title">Правильный порядок букв</div>
                    <div class="sequence-container" id="sequence-container">
                        <!-- слоты будут созданы скриптом -->
                    </div>
                </div>
                
                <div class="letters-container" id="letters-container">
                    <!-- буквы будут созданы скриптом -->
                </div>
                
                <div class="buttons-container" id="buttons-container">
                    <button class="check-button" id="check-button">Проверить</button>
                </div>
                
                <div class="task-status" id="task-status"></div>
            </div>
        </div>
        
        <div class="result-container" id="result-container">
            <h2 class="result-title" id="result-title">Поздравляем!</h2>
            <div class="reward" id="reward-message">Все задания пройдены!</div>
            <div class="final-controls">
                <button id="restart-btn">Играть снова</button>
                <button id="exit-btn">Завершить</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // НОВЫЕ ЗАДАНИЯ: 
            // Задание 1: правильный порядок Щ Э Ю Я (исходные буквы Ю Я Э Щ)
            // Задание 2: Й К Л М
            // Задание 3: Е Ж З И
            // Задание 4: Н О П Р
            // Буквы в кружочках перемешаны вручную для разнообразия
            const tasks = [
                { 
                    id: 0, 
                    correctSequence: ['Щ', 'Э', 'Ю', 'Я'], 
                    letters: ['Ю', 'Я', 'Э', 'Щ'], // перемешано: Щ,Э,Ю,Я -> Ю,Я,Э,Щ
                    instruction: 'Задание 1' 
                },
                { 
                    id: 1, 
                    correctSequence: ['Й', 'К', 'Л', 'М'], 
                    letters: ['Л', 'М', 'Й', 'К'], // перемешано: Й,К,Л,М -> Л,М,Й,К
                    instruction: 'Задание 2' 
                },
                { 
                    id: 2, 
                    correctSequence: ['Е', 'Ж', 'З', 'И'], 
                    letters: ['З', 'И', 'Е', 'Ж'], // перемешано: Е,Ж,З,И -> З,И,Е,Ж
                    instruction: 'Задание 3' 
                },
                { 
                    id: 3, 
                    correctSequence: ['Н', 'О', 'П', 'Р'], 
                    letters: ['П', 'Р', 'Н', 'О'], // перемешано: Н,О,П,Р -> П,Р,Н,О
                    instruction: 'Задание 4' 
                }
            ];

            let currentTaskIndex = 0;
            let completedTasks = [false, false, false, false];
            let usedLetters = new Set();
            let isCurrentTaskCompleted = false;
            let autoTransitionTimer = null;
            let resetTimer = null;

            // DOM элементы
            const lettersContainer = document.getElementById('letters-container');
            const sequenceContainer = document.getElementById('sequence-container');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const taskStatus = document.getElementById('task-status');
            const resultContainer = document.getElementById('result-container');
            const rewardMessage = document.getElementById('reward-message');
            const taskTitle = document.getElementById('task-title');
            const restartBtn = document.getElementById('restart-btn');
            const exitBtn = document.getElementById('exit-btn');
            const checkButton = document.getElementById('check-button');
            const taskNav = document.getElementById('task-nav');

            function updateProgressBar() {
                const completedCount = completedTasks.filter(v => v).length;
                progressBar.style.width = (completedCount / tasks.length * 100) + '%';
                progressText.textContent = `Прогресс: ${completedCount}/${tasks.length}`;
            }

            function renderTaskDots() {
                taskNav.innerHTML = '';
                tasks.forEach((t, idx) => {
                    const dot = document.createElement('div');
                    dot.className = 'task-dot';
                    if (idx === currentTaskIndex) dot.classList.add('active');
                    if (completedTasks[idx]) dot.classList.add('completed-dot');
                    dot.textContent = idx + 1;
                    dot.addEventListener('click', () => switchToTask(idx));
                    taskNav.appendChild(dot);
                });
            }

            function switchToTask(index) {
                if (index === currentTaskIndex) return;
                if (autoTransitionTimer) {
                    clearTimeout(autoTransitionTimer);
                    autoTransitionTimer = null;
                }
                if (resetTimer) {
                    clearTimeout(resetTimer);
                    resetTimer = null;
                }
                currentTaskIndex = index;
                loadTask(currentTaskIndex);
                renderTaskDots();
            }

            function fullResetCurrentTask() {
                if (isCurrentTaskCompleted) return;

                const slots = document.querySelectorAll('.sequence-slot');
                slots.forEach(slot => {
                    const letterId = slot.dataset.letterId;
                    if (letterId) {
                        const letterEl = document.getElementById(letterId);
                        if (letterEl) {
                            letterEl.classList.remove('used');
                            letterEl.draggable = true;
                            usedLetters.delete(letterId);
                        }
                    }
                    slot.textContent = '';
                    slot.classList.remove('filled', 'correct', 'wrong');
                    delete slot.dataset.letterId;
                });

                document.querySelectorAll('.letter.used').forEach(l => {
                    if (!usedLetters.has(l.id)) {
                        l.classList.remove('used');
                        l.draggable = true;
                    }
                });

                checkButton.disabled = true;
                taskStatus.textContent = '';
            }

            function loadTask(taskIdx) {
                const task = tasks[taskIdx];
                usedLetters.clear();
                isCurrentTaskCompleted = false;

                taskTitle.textContent = task.instruction;
                lettersContainer.innerHTML = '';
                sequenceContainer.innerHTML = '';
                taskStatus.textContent = '';
                taskStatus.className = 'task-status';

                checkButton.style.display = 'inline-block';
                checkButton.disabled = true;

                for (let i = 0; i < 4; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'sequence-slot';
                    slot.dataset.position = i;
                    
                    slot.addEventListener('dragover', handleDragOverSlot);
                    slot.addEventListener('dragleave', handleDragLeaveSlot);
                    slot.addEventListener('drop', handleDropSlot);
                    slot.addEventListener('click', handleSlotClick);
                    
                    sequenceContainer.appendChild(slot);
                    
                    if (i < 3) {
                        const connector = document.createElement('div');
                        connector.className = 'connector';
                        connector.textContent = '→';
                        sequenceContainer.appendChild(connector);
                    }
                }

                // Используем уже перемешанные буквы из задания (task.letters)
                // Дополнительно перемешиваем, чтобы порядок при каждой загрузке был разный
                const shuffled = [...task.letters].sort(() => Math.random() - 0.5);
                
                shuffled.forEach((letter, idx) => {
                    const letterEl = document.createElement('div');
                    letterEl.className = 'letter';
                    letterEl.textContent = letter;
                    letterEl.draggable = true;
                    letterEl.dataset.letter = letter;
                    letterEl.dataset.index = idx;
                    letterEl.id = `letter-${taskIdx}-${idx}-${Date.now()}-${Math.random()}`;
                    
                    letterEl.addEventListener('dragstart', handleDragStart);
                    letterEl.addEventListener('dragend', handleDragEnd);
                    
                    lettersContainer.appendChild(letterEl);
                });

                if (completedTasks[taskIdx]) {
                    lockTaskAsCompleted(taskIdx);
                }

                resultContainer.style.display = 'none';
            }

            function lockTaskAsCompleted(taskIdx) {
                const task = tasks[taskIdx];
                document.querySelectorAll('.letter').forEach(l => {
                    l.draggable = false;
                    l.classList.add('used');
                });
                const slots = document.querySelectorAll('.sequence-slot');
                slots.forEach((slot, idx) => {
                    slot.textContent = task.correctSequence[idx];
                    slot.classList.add('filled', 'correct');
                    slot.classList.remove('wrong', 'highlight');
                });
                checkButton.style.display = 'none';
                taskStatus.textContent = 'Уже выполнено!';
                taskStatus.className = 'task-status completed';
                isCurrentTaskCompleted = true;
            }

            function handleDragStart(e) {
                if (e.target.classList.contains('used') || isCurrentTaskCompleted) {
                    e.preventDefault();
                    return;
                }
                e.dataTransfer.setData('text/plain', e.target.dataset.letter);
                e.dataTransfer.setData('id', e.target.id);
                e.target.classList.add('dragging');
            }

            function handleDragEnd(e) {
                e.target.classList.remove('dragging');
                document.querySelectorAll('.sequence-slot').forEach(s => s.classList.remove('highlight'));
            }

            function handleDragOverSlot(e) {
                e.preventDefault();
                if (isCurrentTaskCompleted) return;
                e.target.classList.add('highlight');
            }

            function handleDragLeaveSlot(e) {
                e.preventDefault();
                e.target.classList.remove('highlight');
            }

            function returnLetterToContainer(letterId) {
                const letterEl = document.getElementById(letterId);
                if (letterEl) {
                    letterEl.classList.remove('used');
                    letterEl.draggable = true;
                    usedLetters.delete(letterId);
                }
                const slots = document.querySelectorAll('.sequence-slot');
                slots.forEach(slot => {
                    if (slot.dataset.letterId === letterId) {
                        delete slot.dataset.letterId;
                    }
                });
            }

            function handleSlotClick(e) {
                if (isCurrentTaskCompleted) return;

                const slot = e.currentTarget;
                const letterId = slot.dataset.letterId;
                if (!letterId) return;

                returnLetterToContainer(letterId);

                slot.textContent = '';
                slot.classList.remove('filled', 'correct', 'wrong');
                delete slot.dataset.letterId;

                const filled = document.querySelectorAll('.sequence-slot.filled').length;
                checkButton.disabled = (filled !== 4);
            }

            function handleDropSlot(e) {
                e.preventDefault();
                if (isCurrentTaskCompleted) return;
                e.target.classList.remove('highlight');

                const letter = e.dataTransfer.getData('text/plain');
                const letterId = e.dataTransfer.getData('id');
                const position = parseInt(e.target.dataset.position);

                if (e.target.textContent !== '') {
                    const oldLetterId = e.target.dataset.letterId;
                    if (oldLetterId) {
                        returnLetterToContainer(oldLetterId);
                    }
                }

                const draggedEl = document.getElementById(letterId);
                if (draggedEl) {
                    if (!draggedEl.classList.contains('used')) {
                        draggedEl.classList.add('used');
                        draggedEl.draggable = false;
                        usedLetters.add(letterId);
                    }
                }

                e.target.textContent = letter;
                e.target.classList.add('filled');
                e.target.dataset.letterId = letterId;

                const filled = document.querySelectorAll('.sequence-slot.filled').length;
                checkButton.disabled = (filled !== 4);
            }

            function goToNextTask() {
                if (currentTaskIndex + 1 < tasks.length) {
                    currentTaskIndex++;
                    loadTask(currentTaskIndex);
                    renderTaskDots();
                } else {
                    rewardMessage.textContent = 'Молодец! Все 4 задания выполнены!';
                    resultContainer.style.display = 'block';
                }
            }

            function checkSequence() {
                if (isCurrentTaskCompleted) return;
                const task = tasks[currentTaskIndex];
                const slots = document.querySelectorAll('.sequence-slot');
                const userSeq = Array.from(slots).map(s => s.textContent);
                const isCorrect = userSeq.every((ch, i) => ch === task.correctSequence[i]);

                if (isCorrect) {
                    slots.forEach(s => {
                        s.classList.remove('wrong');
                        s.classList.add('correct');
                    });

                    completedTasks[currentTaskIndex] = true;
                    isCurrentTaskCompleted = true;
                    updateProgressBar();

                    checkButton.style.display = 'none';

                    renderTaskDots();

                    if (autoTransitionTimer) clearTimeout(autoTransitionTimer);
                    autoTransitionTimer = setTimeout(() => {
                        autoTransitionTimer = null;
                        goToNextTask();
                    }, 800);

                } else {
                    slots.forEach((slot, i) => {
                        if (slot.textContent !== task.correctSequence[i]) {
                            slot.classList.add('wrong');
                            slot.classList.remove('correct');
                        } else {
                            slot.classList.add('correct');
                            slot.classList.remove('wrong');
                        }
                    });
                    taskStatus.textContent = 'Попробуй ещё раз!';
                    taskStatus.className = 'task-status not-completed';
                    
                    if (resetTimer) clearTimeout(resetTimer);
                    
                    resetTimer = setTimeout(() => {
                        fullResetCurrentTask();
                        resetTimer = null;
                    }, 1500);
                }
            }

            function initFullGame() {
                if (autoTransitionTimer) {
                    clearTimeout(autoTransitionTimer);
                    autoTransitionTimer = null;
                }
                if (resetTimer) {
                    clearTimeout(resetTimer);
                    resetTimer = null;
                }
                completedTasks = [false, false, false, false];
                currentTaskIndex = 0;
                updateProgressBar();
                renderTaskDots();
                loadTask(0);
                resultContainer.style.display = 'none';
            }

            checkButton.addEventListener('click', checkSequence);

            restartBtn.addEventListener('click', () => {
                initFullGame();
            });

            exitBtn.addEventListener('click', () => {
                if (completedTasks.every(v => v)) {
                    alert('Ты отлично справился!');
                } else {
                    alert('Продолжай заниматься!');
                }
            });

            initFullGame();
        })();
    </script>
</body>
</html>
