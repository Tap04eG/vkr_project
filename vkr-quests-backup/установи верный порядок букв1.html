<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Установи порядок букв - Обучающая игра для детей</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #FFF8E1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background-color: #FFE0B2;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.2);
            border: 5px solid #FF9800;
        }

        h1 {
            color: #E65100;
            text-align: center;
            margin-top: 0;
            text-shadow: 2px 2px 0 #FFCC80;
            font-size: 2.5rem;
        }

        .instructions {
            background-color: #FFB74D;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #5D4037;
            text-align: center;
            border: 3px dashed #FF9800;
        }

        .progress-container {
            width: 100%;
            background-color: #FFCC80;
            border-radius: 10px;
            margin: 20px 0;
            height: 25px;
            overflow: hidden;
            border: 3px solid #FF9800;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #FF9800;
            border-radius: 7px;
            transition: width 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5D4037;
            font-weight: bold;
            font-size: 1rem;
        }

        .game-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .task-container {
            flex: 1;
            min-width: 300px;
            background-color: #FFCC80;
            border-radius: 15px;
            padding: 15px;
            border: 4px solid #FF9800;
        }

        .task-title {
            text-align: center;
            color: #BF360C;
            margin-top: 0;
            font-size: 1.8rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            min-height: 120px;
            padding: 15px;
            background-color: #FFE0B2;
            border-radius: 15px;
            border: 2px dashed #FF9800;
        }

        .letter {
            width: 70px;
            height: 70px;
            background-color: #FF9800;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            cursor: move;
            user-select: none;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
            border: 4px solid #FF5722;
        }

        .letter:hover {
            transform: scale(1.05);
        }

        .letter.dragging {
            opacity: 0.8;
            transform: scale(1.1);
        }

        .target-container {
            min-height: 150px;
            background-color: #FFE0B2;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 3px dashed #FF9800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .target-title {
            color: #5D4037;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .sequence-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .sequence-slot {
            width: 80px;
            height: 80px;
            border: 3px dashed #FF9800;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #5D4037;
            background-color: #FFE0B2;
            transition: background-color 0.3s;
        }

        .sequence-slot.highlight {
            background-color: #FFB74D;
        }

        .sequence-slot.filled {
            background-color: #FFCC80;
            border-style: solid;
        }

        .sequence-slot.correct {
            background-color: #C8E6C9;
            border-color: #4CAF50;
        }

        .sequence-slot.wrong {
            background-color: #FFCDD2;
            border-color: #F44336;
        }

        .result-container {
            text-align: center;
            padding: 20px;
            background-color: #FFB74D;
            border-radius: 15px;
            border: 4px solid #FF9800;
            margin-top: 20px;
            display: none;
        }

        .result-title {
            color: #BF360C;
            margin-top: 0;
            font-size: 2rem;
        }

        .reward {
            font-size: 2.2rem;
            color: #E65100;
            font-weight: bold;
            text-shadow: 1px 1px 0 white;
            animation: pulse 1.5s infinite;
            margin-bottom: 25px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        button {
            padding: 12px 30px;
            background-color: #FF9800;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background-color: #F57C00;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #FFCC80;
            cursor: not-allowed;
            transform: none;
        }

        .task-status {
            text-align: center;
            font-size: 1.4rem;
            margin-top: 15px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .completed {
            color: #388E3C;
            font-weight: bold;
        }

        .not-completed {
            color: #D32F2F;
        }

        .final-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .game-area {
                flex-direction: column;
            }

            .task-container {
                min-width: 100%;
            }

            h1 {
                font-size: 2rem;
            }

            .letter {
                width: 65px;
                height: 65px;
                font-size: 2.2rem;
            }

            .sequence-slot {
                width: 70px;
                height: 70px;
            }

            .final-controls {
                flex-direction: column;
                gap: 10px;
            }

            .final-controls button {
                width: 100%;
            }
        }

        .connector {
            font-size: 2rem;
            color: #5D4037;
            font-weight: bold;
            margin: 0 5px;
        }

        .sequence-item {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Установи порядок букв!</h1>

        <div class="instructions">
            Перетащи правильные буквы на пропущенные места в последовательностях! Выполни все 4 задания!
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="progress-text" id="progress-text">Прогресс: 0/4</div>
        </div>

        <div class="game-area">
            <div class="task-container">
                <h2 class="task-title" id="task-title">Ь Э … Я</h2>

                <div class="target-container">
                    <div class="target-title">Установи порядок букв</div>
                    <div class="sequence-container" id="sequence-container">
                        <!-- Последовательность будет создана через JavaScript -->
                    </div>
                </div>

                <div class="letters-container" id="letters-container">
                    <!-- Буквы будут добавлены через JavaScript -->
                </div>

                <div class="task-status" id="task-status"></div>
            </div>
        </div>

        <div class="result-container" id="result-container">
            <h2 class="result-title">Поздравляем!</h2>
            <div class="reward" id="reward-message">Молодец! Отличная работа!</div>
            <div class="final-controls">
                <button id="restart-btn">Начать заново</button>
                <button id="exit-btn">Завершить</button>
            </div>
        </div>
    </div>

    <script>
        // Задания: массив объектов с данными для каждого задания
        // Правильные ответы: Ю, Г, Ё, Й (согласно вашему запросу)
        const tasks = [
            {
                id: 1,
                sequence: ['Ь', 'Э', '?', 'Я'],
                correctLetter: 'Ю',
                instruction: 'Ь Э … Я',
                explanation: 'Правильно! Ь → Э → Ю → Я'
            },
            {
                id: 2,
                sequence: ['Б', 'В', '?', 'Д'],
                correctLetter: 'Г',
                instruction: 'Б В … Д',
                explanation: 'Правильно! Б → В → Г → Д'
            },
            {
                id: 3,
                sequence: ['Д', 'Е', '?', 'Ж'],
                correctLetter: 'Ё',
                instruction: 'Д Е … Ж',
                explanation: 'Правильно! Д → Е → Ё → Ж'
            },
            {
                id: 4,
                sequence: ['З', 'И', '?', 'К'],
                correctLetter: 'Й',
                instruction: 'З И … К',
                explanation: 'Правильно! З → И → Й → К'
            }
        ];

        // Алфавит для генерации случайных букв (заглавные русские)
        const alphabet = ['А', 'Б', 'В', 'Г', 'Д', 'Е', 'Ё', 'Ж', 'З', 'И', 'Й', 'К', 'Л', 'М', 'Н', 'О', 'П', 'Р', 'С', 'Т', 'У', 'Ф', 'Х', 'Ц', 'Ч', 'Ш', 'Щ', 'Ъ', 'Ы', 'Ь', 'Э', 'Ю', 'Я'];

        // Переменные состояния игры
        let currentTaskIndex = 0;
        let completedTasks = 0;

        // Элементы DOM
        const lettersContainer = document.getElementById('letters-container');
        const sequenceContainer = document.getElementById('sequence-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const taskStatus = document.getElementById('task-status');
        const resultContainer = document.getElementById('result-container');
        const rewardMessageElement = document.getElementById('reward-message');
        const taskTitle = document.getElementById('task-title');
        const restartBtn = document.getElementById('restart-btn');
        const exitBtn = document.getElementById('exit-btn');

        // Инициализация игры
        function initGame() {
            // Сброс состояния игры
            currentTaskIndex = 0;
            completedTasks = 0;
            updateProgress();
            resultContainer.style.display = 'none';

            // Загрузка первого задания
            loadTask(currentTaskIndex);
        }

        // Загрузка задания
        function loadTask(taskIndex) {
            const task = tasks[taskIndex];

            // Очистка контейнеров
            lettersContainer.innerHTML = '';
            taskStatus.textContent = '';
            taskStatus.className = 'task-status';

            // Установка заголовка задания
            taskTitle.textContent = task.instruction;

            // Обновляем последовательность
            updateSequence(task);

            // Создание букв для перетаскивания: 1 правильная + 3 случайные неправильные
            createDraggableLetters(task);
        }

        // Обновление последовательности
        function updateSequence(task) {
            sequenceContainer.innerHTML = '';

            const sequenceItem = document.createElement('div');
            sequenceItem.className = 'sequence-item';

            task.sequence.forEach((letter, index) => {
                if (letter === '?') {
                    // Создаем слот для перетаскивания
                    const slot = document.createElement('div');
                    slot.className = 'sequence-slot';
                    slot.id = 'slot-' + task.id + '-' + index;
                    slot.dataset.position = index;
                    slot.dataset.taskId = task.id;

                    // Добавляем обработчики для слота
                    slot.addEventListener('dragover', handleDragOverSlot);
                    slot.addEventListener('dragleave', handleDragLeaveSlot);
                    slot.addEventListener('drop', handleDropSlot);

                    sequenceItem.appendChild(slot);
                } else {
                    // Создаем заполненный слот
                    const slot = document.createElement('div');
                    slot.className = 'sequence-slot filled';
                    slot.textContent = letter;
                    sequenceItem.appendChild(slot);
                }

                // Добавляем стрелку между элементами (кроме последнего)
                if (index < task.sequence.length - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'connector';
                    connector.textContent = '→';
                    sequenceItem.appendChild(connector);
                }
            });

            sequenceContainer.appendChild(sequenceItem);
        }

        // Функция для получения случайных неправильных букв (не равных correctLetter и не входящих в последовательность)
        function getRandomWrongLetters(correctLetter, sequence, count = 3) {
            // Буквы, которые нельзя использовать: правильный ответ и буквы из последовательности (кроме '?')
            const forbidden = new Set([correctLetter, ...sequence.filter(l => l !== '?')]);

            // Доступные буквы из алфавита, которые не входят в forbidden
            const available = alphabet.filter(letter => !forbidden.has(letter));

            // Перемешиваем и берем первые count
            const shuffled = [...available].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        // Создание перетаскиваемых букв: 1 правильная + 3 случайные неправильные
        function createDraggableLetters(task) {
            const lettersToShow = [];

            // Добавляем правильную букву
            lettersToShow.push({
                letter: task.correctLetter,
                isCorrect: true
            });

            // Получаем 3 случайные неправильные буквы
            const wrongLetters = getRandomWrongLetters(task.correctLetter, task.sequence, 3);
            wrongLetters.forEach(letter => {
                lettersToShow.push({
                    letter: letter,
                    isCorrect: false
                });
            });

            // Перемешиваем массив, чтобы правильная буква не всегда была первой
            const shuffledLetters = lettersToShow.sort(() => Math.random() - 0.5);

            // Создаем DOM-элементы
            shuffledLetters.forEach(item => {
                const letterDiv = document.createElement('div');
                letterDiv.className = 'letter';
                letterDiv.textContent = item.letter;
                letterDiv.draggable = true;
                letterDiv.dataset.letter = item.letter;
                letterDiv.dataset.correct = item.isCorrect ? 'true' : 'false';

                letterDiv.addEventListener('dragstart', handleDragStart);
                letterDiv.addEventListener('dragend', handleDragEnd);

                lettersContainer.appendChild(letterDiv);
            });
        }

        // Обработчик начала перетаскивания
        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.dataset.letter);
            e.dataTransfer.setData('correct', e.target.dataset.correct);
            e.target.classList.add('dragging');
        }

        // Обработчик окончания перетаскивания
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            // Убираем highlight со всех слотов
            document.querySelectorAll('.sequence-slot').forEach(slot => {
                slot.classList.remove('highlight');
            });
        }

        // Обработчик наведения на слот
        function handleDragOverSlot(e) {
            e.preventDefault();
            e.target.classList.add('highlight');
        }

        // Обработчик ухода с слота
        function handleDragLeaveSlot(e) {
            e.preventDefault();
            e.target.classList.remove('highlight');
        }

        // Обработчик сброса на слот
        function handleDropSlot(e) {
            e.preventDefault();
            e.target.classList.remove('highlight');

            const letter = e.dataTransfer.getData('text/plain');
            const isCorrect = e.dataTransfer.getData('correct') === 'true';
            const task = tasks[currentTaskIndex];

            // Заполняем слот буквой
            e.target.textContent = letter;
            e.target.classList.add('filled');

            // Проверка правильности ответа
            if (isCorrect) {
                e.target.classList.add('correct');
                e.target.classList.remove('wrong');

                taskStatus.textContent = task.explanation;
                taskStatus.className = 'task-status completed';

                // Увеличиваем счетчик выполненных заданий, если это задание еще не было выполнено
                if (currentTaskIndex === completedTasks) {
                    completedTasks++;
                    updateProgress();
                }

                // Автоматически переходим к следующему заданию через 1.5 секунды
                setTimeout(() => {
                    nextTask();
                }, 1500);

            } else {
                e.target.classList.add('wrong');
                e.target.classList.remove('correct');

                taskStatus.textContent = 'Неверно! Попробуй другую букву';
                taskStatus.className = 'task-status not-completed';

                // Через секунду очищаем слот
                setTimeout(() => {
                    e.target.textContent = '';
                    e.target.classList.remove('filled', 'wrong', 'correct');
                    taskStatus.textContent = '';
                }, 1000);
            }
        }

        // Обновление прогресса
        function updateProgress() {
            const progressPercentage = (completedTasks / tasks.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
            progressText.textContent = `Прогресс: ${completedTasks}/${tasks.length}`;
        }

        // Переход к следующему заданию
        function nextTask() {
            // Если все задания выполнены, показываем результаты
            if (completedTasks === tasks.length) {
                showResults();
                return;
            }

            // Если есть следующее задание, переходим к нему
            if (currentTaskIndex < tasks.length - 1) {
                currentTaskIndex++;
                loadTask(currentTaskIndex);
            }
            // Если текущее последнее, но не все выполнены - остаемся (не должно происходить)
        }

        // Показ результатов
        function showResults() {
            // Определяем сообщение в зависимости от результата
            let rewardMessage = '';
            const percentage = (completedTasks / tasks.length) * 100;

            if (percentage === 100) {
                rewardMessage = 'Великолепно! Все задания выполнены верно!';
            } else if (percentage >= 75) {
                rewardMessage = 'Замечательно! Почти все получилось!';
            } else if (percentage >= 50) {
                rewardMessage = 'Хорошая работа! Есть над чем поработать!';
            } else {
                rewardMessage = 'Не сдавайся! Попробуй ещё раз!';
            }

            // Обновляем сообщение
            rewardMessageElement.textContent = rewardMessage;

            // Показываем контейнер с результатами
            resultContainer.style.display = 'block';

            // Прокручиваем к результатам
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', initGame);

        // Добавление обработчиков событий для кнопок
        restartBtn.addEventListener('click', () => {
            initGame();
        });

        exitBtn.addEventListener('click', () => {
            alert('Игра завершена! Молодец! Ты отлично справился с заданиями!');
        });
    </script>
</body>
</html>
