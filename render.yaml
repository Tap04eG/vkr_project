services:
  - type: web
    name: kidslearn
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt && cd ../frontend && npm install && npm run build"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
